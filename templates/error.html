{% extends "base.html" %}

{% block title %}Error - Food Consumption{% endblock %}

{% block content %}
<div class="card text-center mb-6" style="max-width: 600px; margin: 4rem auto;">
    <div class="card-header">
        <i class="fas fa-triangle-exclamation fa-4x text-danger mb-4"></i>
        <h1 class="card-title text-danger">Oops! Something went wrong</h1>
    </div>
    <div class="p-4">
        <p class="text-muted mb-6" style="font-size: 1.1rem;">{{ error }}</p>
        <div class="d-flex justify-center" style="gap: 1rem;">
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
