<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SHAREAT PRIMA | Login</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/shareat.jpg') }}?v=2">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        /* NEW BRAND STYLING */
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .brand img {
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 1px solid #e5e7eb;
        }
        .brand-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .brand-text .title {
            font-weight: 800;
            font-size: 1.6rem;
            color: #111827;
            line-height: 1;
        }
        .brand-text .subtitle {
            font-weight: 700;
            font-size: 0.85rem;
            color: #dc2626;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #475569; font-size: 0.875rem;}
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #2563eb; }
        .alert {
            background: #fee2e2;
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="brand">
            <img src="{{ url_for('static', filename='images/shareat.jpg') }}" alt="Shareat Logo">
            <div class="brand-text">
                <span class="title">SHAREAT</span>
                <span class="subtitle">PRIMA</span>
            </div>
        </div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">Sign In to Dashboard</button>
        </form>
    </div>

</body>
</html>
